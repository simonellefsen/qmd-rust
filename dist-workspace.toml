[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "homebrew", "msi"]
# A GitHub repo to push Homebrew formulas to
tap = "simonellefsen/homebrew-qmd"
# Customize the Homebrew formula name
formula = "qmd"
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu", "x86_64-unknown-linux-musl", "x86_64-pc-windows-msvc"]
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Which actions to run on pull requests
pr-run-mode = "plan"

# Whether to install dependencies needed to build.
enable-cargo-install = true
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.xz"
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".zip"
# Whether to auto-include files like READMEs, LICENSEs, and CHANGELOGs (default true)
auto-includes = true
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false

# Whether to sign the binaries with a cosign key (requires setting up cosign)
# signing = "cosign"

[dist.github-custom-runners]
# You can add custom runners here if you need more power (e.g. for cross-compilation)
# aarch64-unknown-linux-gnu = "ubuntu-22.04"

[dist.dependencies]
# If you need system libraries at build time, declare them here.
# Example for sqlite if you ever switch away from bundled:
# "libsqlite3-dev" = { version = "*", targets = ["x86_64-unknown-linux-gnu"] }
