# This file was autogenerated by cargo-dist (https://github.com/axodotdev/cargo-dist)
# and is kept up to date by the CI. You can edit it, but you probably shouldn't.

name: Release

permissions:
  contents: write

# This task will run whenever you push a git tag that looks like a version
# (e.g. "v1.0.0").
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+**'

jobs:
  # Run 'cargo dist plan' (or host) to determine the tasks we need to do.
  plan:
    runs-on: ubuntu-latest
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        # We use a pinned version of cargo-dist to make sure the generated
        # workflow doesn't change without us noticing.
        uses: cargo-bins/cargo-dist-action@v1
        with:
          version: "v0.28.0"
      - id: plan
        run: |
          cargo dist ${{ !github.event.pull_request && 'host' || 'plan' }} ${{ steps.plan.outputs.tag-flag }} --output-format=json > plan-dist-manifest.json
          echo "manifest=$(jq -c < plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific binaries
  build-local-artifacts:
    name: "Local Artifacts"
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'plan' }}
    strategy:
      fail-fast: false
      matrix:
        # For aarch64, we need to use a different runner or cross
        include:
          - runner: macos-14
            dist-args: --target aarch64-apple-darwin --target x86_64-apple-darwin
            install-dist: |
              curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
          - runner: ubuntu-22.04
            dist-args: --target x86_64-unknown-linux-gnu --target x86_64-unknown-linux-musl
            install-dist: |
              curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
          - runner: windows-2022
            dist-args: --target x86_64-pc-windows-msvc
            install-dist: |
              curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.ps1 | pwsh -c -

    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: ${{ matrix.install-dist }}
      - name: Run cargo-dist
        run: |
          cargo dist build-local-artifacts ${{ needs.plan.outputs.tag-flag }} ${{ matrix.dist-args }} --output-format=json
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-local-${{ matrix.runner }}
          path: |
            target/distrib/*

  # Build and packages all the platform-specific binaries (for cross-compilation cases)
  build-global-artifacts:
    needs:
      - plan
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
      - name: Run cargo-dist
        run: |
          cargo dist build-global-artifacts ${{ needs.plan.outputs.tag-flag }} --output-format=json
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-global
          path: |
            target/distrib/*

  # Build and packages all the platform-specific binaries
  build-local-artifacts:
    name: "Local Artifacts (${{ join(matrix.targets, ', ') }})"
    needs:
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'plan' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - runner: ubuntu-22.04
            targets: "x86_64-unknown-linux-gnu x86_64-unknown-linux-musl"
          - runner: windows-2022
            targets: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.runner }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.targets }}
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
      - name: Run cargo-dist
        run: |
          cargo dist build-local-artifacts ${{ needs.plan.outputs.tag-flag }} --output-format=json --targets ${{ matrix.targets }}
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-local-${{ matrix.runner }}
          path: |
            target/distrib/*

  # Build and packages all the platform-specific binaries
  build-global-artifacts:
    needs:
      - plan
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
      - name: Run cargo-dist
        run: |
          cargo dist build-global-artifacts ${{ needs.plan.outputs.tag-flag }} --output-format=json
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-global
          path: |
            target/distrib/*

  # Generate the Homebrew formula and push it to the tap
  generate-homebrew:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install cargo-dist
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.28.0/cargo-dist-installer.sh | sh
      - name: Generate Homebrew formula
        run: |
          cargo dist generate-homebrew-formula ${{ needs.plan.outputs.tag-flag }} --output-format=json
      - name: "Upload Homebrew formula"
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-homebrew-formula
          path: |
            target/distrib/qmd.rb

  # Create the GitHub Release and upload all artifacts
  upload-release-artifacts:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - generate-homebrew
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: "Download artifacts"
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: "Create Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.tag }}
          name: ${{ needs.plan.outputs.tag }}
          body: |
            See the [changelog](https://github.com/simonellefsen/qmd-rust/blob/main/CHANGELOG.md) for details.
          files: |
            artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Update the Homebrew tap
  update-homebrew-tap:
    needs:
      - upload-release-artifacts
      - generate-homebrew
    runs-on: "ubuntu-22.04"
    if: ${{ needs.plan.outputs.publishing == 'true' }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: "Checkout tap"
        uses: actions/checkout@v4
        with:
          repository: simonellefsen/homebrew-qmd
          token: ${{ secrets.GITHUB_TOKEN }}
          path: homebrew-qmd
      - name: "Download Homebrew formula"
        uses: actions/download-artifact@v4
        with:
          name: artifacts-homebrew-formula
          path: .
      - name: "Update formula in tap"
        run: |
          cp qmd.rb homebrew-qmd/Formula/qmd.rb
          cd homebrew-qmd
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/qmd.rb
          git commit -m "chore: update qmd to ${{ needs.plan.outputs.tag }}" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
