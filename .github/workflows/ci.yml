name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Separation of concerns (build/test lanes vs. future behavioral parity):
  # - "check", "test", "build", "macos" answer: "does it build and pass basic tests?"
  # - Dedicated behavior/parity jobs (see parity-skeleton below) will answer:
  #   "is behavior correct?" (vs reference impl). Keeps lanes focused + fast.
  check:
    name: Check + Format + Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check
        run: cargo check --all-targets

  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: cargo test
        run: cargo test --all

  build:
    name: Build Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo build --release
        run: cargo build --release
      # Binary size reporting (smallest step for future cargo-dist release tracking).
      # `ls -l` here; later can post as PR comment or enforce budgets.
      - name: Report binary size
        run: ls -l target/release/qmd || true

  macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --all-targets

  # Basic release artifact job (expand with cross-compilation later)
  release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qmd-linux-x86_64
          path: target/release/qmd

  # parity-skeleton (behavioral comparison placeholder, smallest viable):
  # Skeleton job + comments only. Intent: later run behavioral comparison of
  # the Rust binary vs. reference implementation sources. Do not implement
  # harness yet (5 lines or less rule). When real: would live in its own
  # parity workflow or here under a "behavior" lane. Currently just a no-op
  # placeholder so the separation philosophy is visible.
  parity-skeleton:
    name: Parity skeleton (behavior vs reference)
    runs-on: ubuntu-latest
    # needs: [build]   # when enabled
    if: false  # placeholder; enable when >5-line harness exists
    steps:
      - run: echo "parity-skeleton placeholder (see job comments for intent)"
